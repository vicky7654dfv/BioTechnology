<body class="error-page">
    <div class="error-container">
        <div class="error-visual">
            <svg class="dna-error-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <path class="dna-strand main" d="M100 20 C140 20, 140 180, 100 180 C60 180, 60 20, 100 20" fill="none" stroke="currentColor" stroke-width="4" stroke-dasharray="10 5"/>
                <circle class="dna-node" cx="100" cy="40" r="6" fill="var(--amber)"/>
                <circle class="dna-node" cx="130" cy="70" r="6" fill="var(--amber-dark)"/>
                <circle class="dna-node" cx="130" cy="130" r="6" fill="var(--amber)"/>
                <circle class="dna-node" cx="100" cy="160" r="6" fill="var(--amber-dark)"/>
                <circle class="dna-node" cx="70" cy="130" r="6" fill="var(--amber)"/>
                <circle class="dna-node" cx="70" cy="70" r="6" fill="var(--amber-dark)"/>
                <!-- Disruption elements -->
                <line x1="80" y1="100" x2="120" y2="100" stroke="var(--amber)" stroke-width="2" stroke-linecap="round"/>
                <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" class="error-code">404</text>

        </div>
        
        <div class="error-content">
            <h1 class="error-title">Sequence Misaligned</h1>
            <p class="error-message">The experimental path you're looking for doesn't exist in our current research database. It might have been relocated or terminated.</p>
            <div class="error-action">

    </div>

    <!-- Theme Initialization Script -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('bt-theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
</body>
